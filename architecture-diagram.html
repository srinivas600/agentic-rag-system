<!DOCTYPE html>
<html lang="en">
<head>

<title>Agentic AI + RAG System — End-to-End Architecture</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #ffffff;
    font-family: 'IBM Plex Sans', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    min-height: 100vh;
  }

  .diagram-wrapper {
    width: 1200px;
    max-width: 100%;
    position: relative;
  }

  h1 {
    text-align: center;
    font-size: 20px;
    font-weight: 700;
    color: #111;
    margin-bottom: 4px;
    letter-spacing: -0.4px;
  }
  .subtitle {
    text-align: center;
    font-size: 11.5px;
    color: #888;
    margin-bottom: 28px;
    font-family: 'IBM Plex Mono', monospace;
  }

  svg { width: 100%; height: auto; display: block; }
  svg text { font-family: 'IBM Plex Sans', sans-serif; }

  [data-tip] { cursor: pointer; }
  [data-tip]:hover rect,
  [data-tip]:hover ellipse { filter: brightness(0.97); }

  .tooltip {
    position: absolute;
    background: #1a1a2e;
    color: #d4d4d8;
    padding: 12px 16px;
    border-radius: 10px;
    font-size: 11.5px;
    line-height: 1.55;
    max-width: 280px;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s;
    z-index: 100;
    font-family: 'IBM Plex Sans', sans-serif;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
  }
  .tooltip.show { opacity: 1; }
  .tooltip strong {
    color: #a5b4fc;
    display: block;
    margin-bottom: 4px;
    font-size: 12.5px;
  }

  .print-note {
    margin-top: 24px;
    text-align: center;
    font-size: 10px;
    color: #bbb;
    font-family: 'IBM Plex Mono', monospace;
  }
</style>
</head>
<body>
<div class="diagram-wrapper">

    <rect width="1160" height="860" fill="url(#grid)"/>

    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Horizontal dividers -->

    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Actor (stick figure) -->

      <line x1="150" y1="77" x2="150" y2="100" stroke="#333" stroke-width="1.8"/>
      <line x1="136" y1="86" x2="164" y2="86" stroke="#333" stroke-width="1.8"/>
      <line x1="150" y1="100" x2="138" y2="118" stroke="#333" stroke-width="1.8"/>

      <text x="150" y="136" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Actor</text>

    <!-- Raw Documents -->

      <rect x="225" y="62" width="135" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>

      <text x="292" y="96" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Data</text>
    </g>
    <line x1="170" y1="84" x2="223" y2="82" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- Chunking & Embedding -->
    <g data-tip="Hierarchical 'small-to-big' chunking: parent chunks (~512 tokens) and child chunks (~128 tokens). Embedded via OpenAI text-embedding-3-large at 1024 dimensions.">

      <text x="495" y="80" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Chunking &amp;</text>
      <text x="495" y="96" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Embedding</text>
    </g>
    <line x1="360" y1="84" x2="413" y2="84" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- Vector DB (Pinecone) - database cylinder shape -->
    <g data-tip="Pinecone serverless vector database. 1024-dimension cosine similarity index. Namespace-based multi-tenancy. Stores child chunk embeddings for retrieval.">
      <ellipse cx="695" cy="72" rx="65" ry="14" fill="#f8f8f8" stroke="#333" stroke-width="1.3"/>
      <rect x="630" y="72" width="130" height="35" fill="#fff" stroke="none"/>

      <line x1="760" y1="72" x2="760" y2="107" stroke="#333" stroke-width="1.3"/>
      <ellipse cx="695" cy="107" rx="65" ry="14" fill="#fff" stroke="#333" stroke-width="1.3"/>
      <text x="695" y="87" text-anchor="middle" font-size="11" font-weight="600" fill="#333">Vector DB</text>
      <text x="695" y="102" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(Pinecone)</text>
    </g>
    <line x1="575" y1="78" x2="628" y2="78" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- SQL DB - database cylinder -->
    <g data-tip="SQLite (dev mode) or PostgreSQL with pgvector (production). Stores documents table (chunks + metadata), products catalog (30 items across 5 categories), and agent session history.">
      <ellipse cx="695" cy="147" rx="65" ry="14" fill="#f8f8f8" stroke="#333" stroke-width="1.3"/>
      <rect x="630" y="147" width="130" height="35" fill="#fff" stroke="none"/>
      <line x1="630" y1="147" x2="630" y2="182" stroke="#333" stroke-width="1.3"/>
      <line x1="760" y1="147" x2="760" y2="182" stroke="#333" stroke-width="1.3"/>
      <ellipse cx="695" cy="182" rx="65" ry="14" fill="#fff" stroke="#333" stroke-width="1.3"/>
      <text x="695" y="163" text-anchor="middle" font-size="11" font-weight="600" fill="#333">SQL DB</text>
      <text x="695" y="178" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(SQLite / PG)</text>
    </g>
    <line x1="520" y1="106" x2="520" y2="155" stroke="#333" stroke-width="1" stroke-dasharray="5,3"/>
    <line x1="520" y1="155" x2="628" y2="163" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>

    <!-- External Sources -->
    <g data-tip="External knowledge sources: Jira issues, Confluence wiki pages, Git repositories. Embedded and pushed to Vector DB.">
      <rect x="885" y="32" width="105" height="34" rx="6" fill="#fff" stroke="#333" stroke-width="1.3" filter="url(#shadow)"/>
      <text x="937" y="54" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Jira</text>
    </g>
    <g data-tip="Confluence wiki documentation as a knowledge source for the RAG system.">
      <rect x="885" y="76" width="105" height="34" rx="6" fill="#fff" stroke="#333" stroke-width="1.3" filter="url(#shadow)"/>
      <text x="937" y="98" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Confluence</text>
    </g>
    <g data-tip="Git repository contents: code, READMEs, and documentation stored as embeddings.">
      <rect x="885" y="120" width="105" height="34" rx="6" fill="#fff" stroke="#333" stroke-width="1.3" filter="url(#shadow)"/>
      <text x="937" y="142" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Git</text>
    </g>
    <g data-tip="Product catalog data (30 products across Electronics, Software, Books, Cloud, Office) stored in the SQL database.">
      <rect x="885" y="164" width="105" height="34" rx="6" fill="#fff" stroke="#333" stroke-width="1.3" filter="url(#shadow)"/>
      <text x="937" y="186" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Products DB</text>
    </g>

    <!-- Embedded data hub -->
    <rect x="800" y="62" width="65" height="44" rx="4" fill="#fff" stroke="#333" stroke-width="1"/>
    <text x="832" y="80" text-anchor="middle" font-size="9" fill="#333">Embedded</text>
    <text x="832" y="93" text-anchor="middle" font-size="9" fill="#333">Data</text>
    <line x1="883" y1="89" x2="867" y2="84" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="800" y1="84" x2="762" y2="82" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>
    <line x1="883" y1="181" x2="762" y2="170" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>


    <!-- ═══════════════════════════════════════════════════ -->
    <!-- RAG LAYER -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Query -->
    <g data-tip="Natural language question submitted by the user through the chat interface or API.">
      <rect x="140" y="272" width="115" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="197" y="298" text-anchor="middle" font-size="13" font-weight="600" fill="#333">Query</text>
    </g>
    <line x1="150" y1="136" x2="150" y2="258" stroke="#333" stroke-width="1.3"/>
    <line x1="150" y1="258" x2="175" y2="270" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- Query Rewriting (HyDE) -->
    <g data-tip="HyDE: LLM generates a hypothetical ideal answer, then its embedding is used for denser semantic retrieval. Multi-query expansion generates paraphrases for better recall.">
      <rect x="310" y="262" width="155" height="55" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="387" y="284" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Query Rewriting</text>
      <text x="387" y="300" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(HyDE + Multi-Query)</text>
    </g>
    <line x1="255" y1="294" x2="308" y2="290" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- Dense Search -->
    <g data-tip="Semantic vector search against Pinecone using OpenAI embeddings. Cosine similarity over 1024-dim vectors. Returns top 4x candidates for re-ranking.">
      <rect x="530" y="245" width="140" height="42" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="600" y="263" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Dense Search</text>
      <text x="600" y="278" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(Similarity Search)</text>
    </g>

    <!-- Sparse Search -->
    <g data-tip="Full-text keyword search using SQL LIKE (SQLite dev) or tsvector (PostgreSQL prod). Catches exact keyword matches that semantic search misses.">
      <rect x="530" y="300" width="140" height="42" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="600" y="318" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Sparse Search</text>
      <text x="600" y="333" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(SQL Full-Text)</text>
    </g>

    <line x1="465" y1="278" x2="528" y2="268" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>
    <line x1="465" y1="300" x2="528" y2="316" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- DB connections to search -->
    <line x1="695" y1="121" x2="650" y2="243" stroke="#aaa" stroke-width="0.9" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>
    <line x1="695" y1="196" x2="650" y2="298" stroke="#aaa" stroke-width="0.9" stroke-dasharray="4,3" marker-end="url(#arrow-gray)"/>

    <!-- Metadata Filtering -->
    <g data-tip="Filters retrieved chunks by metadata: doc_type, tenant_id, source. Applied before or during vector search via Pinecone filter expressions.">

      <text x="600" y="378" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Metadata</text>
      <text x="600" y="393" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Filtering</text>
    </g>
    <line x1="600" y1="342" x2="600" y2="358" stroke="#333" stroke-width="1.0" marker-end="url(#arrow)"/>

    <!-- RRF Merge -->
    <g data-tip="Reciprocal Rank Fusion: score = Σ 1/(k + rank) across dense and sparse results. Merges both ranked lists into a unified set. Eliminates duplicates.">
      <rect x="730" y="270" width="140" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="800" y="289" text-anchor="middle" font-size="11" font-weight="500" fill="#333">RRF Merge</text>
      <text x="800" y="305" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(Hybrid Fusion)</text>
    </g>
    <line x1="670" y1="268" x2="728" y2="284" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>
    <line x1="670" y1="320" x2="728" y2="300" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- Cross-Encoder Re-Ranking -->
    <g data-tip="Cross-encoder re-ranking with ms-marco-MiniLM-L-6-v2. Re-scores top candidates using full query-document pair attention. Highest-ROI RAG improvement.">
      <rect x="930" y="270" width="155" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.5" filter="url(#shadow)"/>
      <text x="1007" y="289" text-anchor="middle" font-size="11" font-weight="500" fill="#333">Cross-Encoder</text>
      <text x="1007" y="305" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(Re-Ranking)</text>
    </g>
    <line x1="870" y1="292" x2="928" y2="292" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- TOP-K -->
    <g data-tip="Final top-k most relevant document chunks after hybrid retrieval, metadata filtering, and cross-encoder re-ranking. Passed as grounding context to the LLM.">
      <rect x="740" y="365" width="120" height="44" rx="6" fill="#fff" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
      <text x="800" y="392" text-anchor="middle" font-size="13" font-weight="700" fill="#333">TOP - K</text>
    </g>
    <line x1="1007" y1="314" x2="1007" y2="380" stroke="#333" stroke-width="1.3"/>
    <line x1="1007" y1="380" x2="862" y2="387" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>
    <line x1="670" y1="381" x2="738" y2="387" stroke="#333" stroke-width="1" stroke-dasharray="5,3" marker-end="url(#arrow-gray)"/>


    <!-- ═══════════════════════════════════════════════════ -->
    <!-- AGENT LAYER -->
    <!-- ═══════════════════════════════════════════════════ -->

    <!-- Context Builder -->
    <g data-tip="Assembles the final prompt: system instructions + retrieved context chunks + conversation history + tool results. Manages token budget to stay within LLM context window.">
      <rect x="405" y="490" width="155" height="52" rx="8" fill="#fff" stroke="#333" stroke-width="2" stroke-dasharray="8,4" filter="url(#shadow)"/>
      <text x="482" y="521" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Context Builder</text>
    </g>
    <line x1="800" y1="409" x2="800" y2="440" stroke="#333" stroke-width="1.3"/>
    <line x1="800" y1="440" x2="562" y2="498" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- LLM -->
    <g data-tip="OpenAI GPT-4o (configurable). Processes assembled context and generates streaming token-by-token responses via Server-Sent Events.">
      <rect x="625" y="488" width="145" height="52" rx="8" fill="#fff" stroke="#333" stroke-width="1.8" filter="url(#shadow)"/>
      <text x="697" y="510" text-anchor="middle" font-size="13" font-weight="700" fill="#333">LLM</text>
      <text x="697" y="528" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(OpenAI GPT-4o)</text>
    </g>
    <line x1="560" y1="516" x2="623" y2="516" stroke="#333" stroke-width="1.3" marker-end="url(#arrow)"/>

    <!-- ReAct Agent -->
    <g data-tip="LangGraph ReAct loop: Think → Act → Observe. Agent decides which tools to call (vector_search, sql_lookup) based on the query. Configurable max iterations with audit trail.">
      <rect x="840" y="478" width="175" height="68" rx="10" fill="#fff" stroke="#333" stroke-width="2" filter="url(#shadow)"/>
      <text x="927" y="503" text-anchor="middle" font-size="13" font-weight="700" fill="#333">ReAct Agent</text>
      <text x="927" y="519" text-anchor="middle" font-size="9" fill="#666" font-family="IBM Plex Mono, monospace">(LangGraph Loop)</text>

    <line x1="810" y1="560" x2="337" y2="523" stroke="#333" stroke-width="1" marker-end="url(#arrow)"/>

    <!-- Tool: vector_search -->

      <rect x="130" y="570" width="125" height="34" rx="17" fill="#eef2ff" stroke="#6366f1" stroke-width="1.3"/>

    </g>

    <!-- Tool: sql_lookup -->
    <g data-tip="SQL lookup tool: runs pre-registered named queries (product_by_id, products_by_category, product_search, session_by_id, recent_sessions) against the business database.">

      <text x="330" y="591" text-anchor="middle" font-size="10" font-weight="600" fill="#4338ca" font-family="IBM Plex Mono, monospace">sql_lookup</text>
    </g>

    <line x1="222" y1="545" x2="195" y2="568" stroke="#6366f1" stroke-width="1" marker-end="url(#arrow-blue)"/>
    <line x1="278" y1="545" x2="322" y2="568" stroke="#6366f1" stroke-width="1" marker-end="url(#arrow-blue)"/>

    <!-- LLM Response -->

<script>
  const tooltip = document.getElementById('tooltip');
  const wrapper = document.querySelector('.diagram-wrapper');

  document.querySelectorAll('[data-tip]').forEach(el => {
    el.addEventListener('mouseenter', e => {
      const tip = el.getAttribute('data-tip');
      const texts = el.querySelectorAll('text');
      const title = texts.length > 0 ? texts[0].textContent : '';
      const rect = el.getBoundingClientRect();
      const wrapRect = wrapper.getBoundingClientRect();

      tooltip.innerHTML = '<strong>' + title + '</strong>' + tip;
      tooltip.classList.add('show');

      let left = rect.left - wrapRect.left + rect.width / 2 - 140;
      left = Math.max(10, Math.min(left, wrapRect.width - 290));
      tooltip.style.left = left + 'px';
      tooltip.style.top = (rect.top - wrapRect.top - tooltip.offsetHeight - 10) + 'px';
    });

    el.addEventListener('mouseleave', () => {
      tooltip.classList.remove('show');
    });
  });
</script>
